name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: audit_db
          POSTGRES_USER: audit_admin
          POSTGRES_PASSWORD: audit_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audit_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw clean verify
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build Docker image
        run: docker build -t kafka-audit-pipeline:latest .
